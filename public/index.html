<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام التحقق من الشهادات - سما المعارف</title>

    <style>
        /* ============================================================
                   RESET & BASE
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: #f4f7fc;
            color: #1e2a4a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        /* ============================================================
                   CONTAINER
                   ============================================================ */
        .app-wrapper {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(16, 30, 70, 0.12);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.3s ease;
        }

        /* ============================================================
                   HEADER
                   ============================================================ */
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1.2rem;
            border-bottom: 2px solid #eef3f9;
            flex-wrap: wrap;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #0f1f3d, #1a2f5a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(15, 31, 61, 0.25);
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f1f3d;
            letter-spacing: -0.3px;
        }

        .logo-text span {
            color: #2a6b9e;
        }

        .header-title {
            margin-right: auto;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e2a4a;
            background: #eef4fc;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
            }
            .header-title {
                margin-right: 0;
                text-align: center;
                white-space: normal;
                font-size: 1rem;
            }
            .logo-wrapper {
                justify-content: center;
            }
        }

        /* ============================================================
                   SEARCH SECTION
                   ============================================================ */
        .search-section {
            margin-top: 1.8rem;
        }

        .search-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e2a4a;
            display: block;
            margin-bottom: 0.4rem;
        }

        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
            background: #f8fafd;
            padding: 0.5rem 0.8rem 0.5rem 0.5rem;
            border-radius: 60px;
            border: 1.5px solid #dce4ef;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .search-row:focus-within {
            border-color: #1a3f6e;
            box-shadow: 0 0 0 4px rgba(26, 63, 110, 0.12);
        }

        .search-select {
            background: transparent;
            border: none;
            padding: 0.6rem 0.4rem 0.6rem 0.8rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e2a4a;
            outline: none;
            cursor: pointer;
            border-left: 1.5px solid #dce4ef;
            min-width: 120px;
        }

        .search-input {
            flex: 1;
            min-width: 160px;
            background: transparent;
            border: none;
            padding: 0.6rem 0.8rem;
            font-size: 1rem;
            outline: none;
            color: #1e2a4a;
        }

        .search-input::placeholder {
            color: #9aabbf;
        }

        .search-btn {
            background: #0f1f3d;
            color: #fff;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .search-btn:hover {
            background: #1a2f5a;
        }

        .search-btn:active {
            transform: scale(0.96);
        }

        @media (max-width: 500px) {
            .search-row {
                border-radius: 20px;
                padding: 0.5rem;
                flex-direction: column;
                background: #f8fafd;
                align-items: stretch;
            }
            .search-select {
                border-left: none;
                border-bottom: 1.5px solid #dce4ef;
                padding: 0.6rem 0.4rem;
                min-width: unset;
            }
            .search-btn {
                padding: 0.7rem;
                width: 100%;
            }
        }

        /* ============================================================
                   ADMIN UPLOAD SECTION (قسم رفع الإكسل)
                   ============================================================ */
        .admin-section {
            margin-top: 2rem;
            border-top: 1.5px dashed #dce4ef;
            padding-top: 1.4rem;
        }

        .admin-toggle {
            background: none;
            border: none;
            color: #1a3f6e;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.6rem;
            border-radius: 30px;
            transition: background 0.2s;
        }

        .admin-toggle:hover {
            background: #eef4fc;
        }

        .admin-toggle .arrow {
            transition: transform 0.25s;
            display: inline-block;
        }

        .admin-toggle .arrow.open {
            transform: rotate(180deg);
        }

        .admin-panel {
            margin-top: 0.8rem;
            display: none;
            background: #f8fafd;
            padding: 1.2rem 1.4rem;
            border-radius: 20px;
            border: 1px solid #e4ebf3;
        }

        .admin-panel.visible {
            display: block;
        }

        .admin-panel p {
            font-size: 0.9rem;
            color: #3a4f6e;
            margin-bottom: 0.6rem;
        }

        .file-upload-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
        }

        .file-upload-wrapper input[type="file"] {
            flex: 1;
            min-width: 180px;
            padding: 0.5rem;
            border: 1.5px dashed #bcc9db;
            border-radius: 30px;
            background: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .file-upload-wrapper input[type="file"]::file-selector-button {
            background: #0f1f3d;
            color: #fff;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 0.8rem;
            transition: background 0.2s;
        }

        .file-upload-wrapper input[type="file"]::file-selector-button:hover {
            background: #1a2f5a;
        }

        .upload-status {
            font-size: 0.9rem;
            color: #2a6b9e;
            font-weight: 500;
        }

        .upload-status.error {
            color: #c0392b;
        }

        .upload-status.success {
            color: #1d7a4f;
        }

        /* ============================================================
                   RESULTS AREA
                   ============================================================ */
        .results-area {
            margin-top: 2rem;
            min-height: 120px;
        }

        /* ----- بطاقة النجاح (Success) ----- */
        .success-card {
            background: linear-gradient(145deg, #e8f5ee, #d4efe3);
            border-right: 6px solid #1d7a4f;
            border-radius: 20px;
            padding: 1.6rem 1.8rem;
            box-shadow: 0 6px 18px rgba(26, 63, 110, 0.08);
            animation: fadeSlideUp 0.35s ease;
        }

        .success-card .badge {
            display: inline-block;
            background: #1d7a4f;
            color: #fff;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.25rem 1.2rem;
            border-radius: 40px;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .success-card .cert-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem 1.5rem;
            margin: 0.6rem 0 0.8rem;
        }

        .success-card .cert-detail .item {
            display: flex;
            flex-direction: column;
        }

        .success-card .cert-detail .item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #3a5a6e;
            font-weight: 600;
        }

        .success-card .cert-detail .item .value {
            font-size: 1.05rem;
            font-weight: 600;
            color: #0f1f3d;
            word-break: break-word;
        }

        .success-card .verification-message {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1.5px solid rgba(29, 122, 79, 0.25);
            font-weight: 500;
            color: #0f3d2a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .success-card .verification-message::before {
            content: "✓";
            font-size: 1.4rem;
            font-weight: 700;
            color: #1d7a4f;
        }

        @media (max-width: 480px) {
            .success-card .cert-detail {
                grid-template-columns: 1fr;
                gap: 0.3rem;
            }
        }

        /* ----- رسالة الخطأ (Error) ----- */
        .error-card {
            background: #fef0ee;
            border-right: 6px solid #c0392b;
            border-radius: 20px;
            padding: 1.6rem 1.8rem;
            animation: fadeSlideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .error-card .error-icon {
            font-size: 2.2rem;
        }

        .error-card .error-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: #7a2a1f;
        }

        .error-card .error-text small {
            display: block;
            font-weight: 400;
            font-size: 0.85rem;
            color: #9a4a3a;
            margin-top: 0.2rem;
        }

        /* ----- حالة "لم يتم البحث بعد" ----- */
        .idle-message {
            text-align: center;
            color: #9aabbf;
            padding: 2rem 0.5rem;
            font-size: 0.95rem;
        }

        .idle-message .icon-big {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        /* ============================================================
                   ANIMATIONS
                   ============================================================ */
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(14px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
                   FOOTER / MISC
                   ============================================================ */
        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #9aabbf;
            border-top: 1px solid #e4ebf3;
            padding-top: 1.2rem;
        }

        .footer-note strong {
            color: #1a3f6e;
        }

        /* ============================================================
                   RESPONSIVE HELPERS
                   ============================================================ */
        .hidden {
            display: none !important;
        }

        .mt-1 {
            margin-top: 0.6rem;
        }

        .text-center {
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="app-wrapper" id="app">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo-icon">سما</div>
                <div class="logo-text">سما <span>المعارف</span></div>
            </div>
            <div class="header-title">نظام التحقق من الشهادات</div>
        </header>

        <!-- ===== SEARCH ===== -->
        <section class="search-section">
            <label class="search-label" for="searchInput">🔍 ابحث عن شهادة</label>
            <div class="search-row">
                <select class="search-select" id="searchType">
                    <option value="certNumber">رقم الشهادة</option>
                    <option value="fullName">الاسم الكامل</option>
                </select>
                <input
                class="search-input"
                id="searchInput"
                type="text"
                placeholder="أدخل رقم الشهادة أو الاسم..."
                autocomplete="off"
                />
                <button class="search-btn" id="searchBtn">تحقق</button>
            </div>
        </section>

        <!-- ===== RESULTS ===== -->
        <section class="results-area" id="resultsArea">
            <!-- الحالة الافتراضية -->
            <div class="idle-message" id="idleMessage">
                <span class="icon-big">📜</span>
                أدخل رقم الشهادة أو الاسم واضغط "تحقق"
            </div>

            <!-- سيتم عرض النتائج ديناميكياً هنا -->
            <div id="resultContainer"></div>
        </section>

        <!-- ===== FOOTER ===== -->
        <div class="footer-note">
            <strong>سما المعارف</strong> — نظام التحقق من الشهادات &bull; جميع الحقوق محفوظة
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // =============================================================
            // 1.  تهيئة التطبيق
            // =============================================================
            console.log('[System] النظام يعتمد على الخادم للبحث والتحديث.');

            // =============================================================
            // 2.  عناصر DOM
            // =============================================================
            const searchInput = document.getElementById('searchInput');
            const searchType = document.getElementById('searchType');
            const searchBtn = document.getElementById('searchBtn');
            const resultContainer = document.getElementById('resultContainer');
            const idleMessage = document.getElementById('idleMessage');

            // =============================================================
            // 5.  عرض النتائج
            // =============================================================

            function renderResult(result) {
                // إخفاء الرسالة الافتراضية
                idleMessage.classList.add('hidden');

                if (!result) {
                    // ----- رسالة خطأ -----
                    resultContainer.innerHTML = `
                            <div class="error-card">
                                <div class="error-icon">⚠️</div>
                                <div class="error-text">
                                    عذراً، لم يتم العثور على هذه الشهادة.
                                    <small>يرجى التأكد من الرقم أو الاسم.</small>
                                </div>
                            </div>
                        `;
                    return;
                }

                // ----- بطاقة نجاح -----
                const {
                    رقم_الشهادة,
                    اسم_الطالب,
                    اسم_الدورة,
                    تاريخ_الإصدار,
                    التقدير
                } = result;

                resultContainer.innerHTML = `
                        <div class="success-card">
                            <span class="badge">✅ معتمدة</span>
                            <div class="cert-detail">
                                <div class="item">
                                    <span class="label">رقم الشهادة</span>
                                    <span class="value">${escHtml(رقم_الشهادة)}</span>
                                </div>
                                <div class="item">
                                    <span class="label">اسم الطالب</span>
                                    <span class="value">${escHtml(اسم_الطالب)}</span>
                                </div>
                                <div class="item">
                                    <span class="label">اسم الدورة</span>
                                    <span class="value">${escHtml(اسم_الدورة)}</span>
                                </div>
                                <div class="item">
                                    <span class="label">تاريخ الإصدار</span>
                                    <span class="value">${escHtml(تاريخ_الإصدار)}</span>
                                </div>
                                <div class="item" style="grid-column: 1 / -1;">
                                    <span class="label">التقدير</span>
                                    <span class="value">${escHtml(التقدير)}</span>
                                </div>
                            </div>
                            <div class="verification-message">
                                هذه الشهادة معتمدة وصادرة رسمياً من مركز <strong>سما المعارف</strong>.
                            </div>
                        </div>
                    `;
            }

            /** دالة مساعدة لتنظيف النص ومنع XSS */
            function escHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // =============================================================
            // 6.  تنفيذ البحث عبر الـ API
            // =============================================================

            async function performSearch() {
                const query = searchInput.value;
                const type = searchType.value;

                if (!query || query.trim() === '') {
                    renderResult(null);
                    return;
                }

                try {
                    const response = await fetch(`/api/search?type=${type}&query=${encodeURIComponent(query)}`);
                    if (response.ok) {
                        const result = await response.json();
                        renderResult(result);
                    } else {
                        renderResult(null);
                    }
                } catch (error) {
                    console.error('Search error:', error);
                    renderResult(null);
                }
            }

            searchBtn.addEventListener('click', performSearch);

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            // عند تغيير نوع البحث، نعطي تلميحاً في الـ placeholder
            searchType.addEventListener('change', function() {
                const type = this.value;
                if (type === 'certNumber') {
                    searchInput.placeholder = 'مثال: SMA-2024-001';
                } else {
                    searchInput.placeholder = 'مثال: أحمد محمد';
                }
                // لا نمسح النص المدخل تلقائياً
            });
            // تعيين placeholder ابتدائي
            searchType.dispatchEvent(new Event('change'));

            console.log('[System] نظام التحقق من الشهادات جاهز.');
            console.log('[System] أعمدة الإكسل المطلوبة: رقم_الشهادة, اسم_الطالب, اسم_الدورة, تاريخ_الإصدار, التقدير');

        })();
    </script>

</body>
</html>
